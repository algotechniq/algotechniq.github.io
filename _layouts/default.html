<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  {% include head.html %}
  <body>
    <div class="col-lg-8 mx-auto p-3 py-md-5">
      {% include header.html %}
      <div class="row g-5 mb-5">
        <div class="col-md-6">
          {{ content }}
        </div>
        {% if page.imgurl %}
        <div class="col-md-6">
          <img src="{{ site.github.url }}/{{ page.imgurl }}" alt="{{ page.imgalt }}" width="90%">
        </div>
        {% endif %}
      </div>
      {% include footer.html %}
    </div>
  </body>
</html>
