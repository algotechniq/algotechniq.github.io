---
layout: default
---

<div class="row g-5 mb-5">
  <div class="col-md-6">
    {{ content }}
  </div>
  <div class="col-md-6">
  {% if page.imgurl %}
    <img src="{{ site.github.url }}/{{ page.imgurl }}" alt="{{ page.imgalt }}" width="90%" {% if page.img-invert-on-dark %}class="invert-on-dark"{% endif %}>
  {% endif %}
    <h3>Articles</h3>
    {% for pub in page.publications %}
    <li>
      <a href="{{ pub.url }}">{{ pub.name }}</a>  
    </li>
  {% endfor %}
  </div>
</div>
