---
layout: default
---

{{ content }}

{% for person in site.data.settings.people %}
<div class="row g-5 mb-5">
  <div class="col-md-6">
    <h4>{{ person.name }}</h5>
    <p>{{ person.title }}</p>
    <p>{{ person.email }}</p>
    <p>
      <div class="row g-5 mb-5">
        <div class="col-md-12">
          {{ person.description }}
        </div>
      </div>
    </p>
  </div>
  <div class="col-md-6">
    <img src="{{ site.github.url }}/{{ person.image }}" alt="Contact" width="100%">
  </div>
</div>
{% endfor %}
